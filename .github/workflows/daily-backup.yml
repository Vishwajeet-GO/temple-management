name: Daily Database Backup
on:
  schedule:
    - cron: '0 12 * * *' # Har din dopahar 12 baje
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Take Backup
        run: pg_dump ${{ secrets.DATABASE_URL }} > backup.sql
      - name: Save Backup
        uses: actions/upload-artifact@v4
        with:
          name: db-backup
          path: backup.sql
          retention-days: 30
